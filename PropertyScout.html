<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertyScout - Hitta Intressanta Fastigheter</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding: 20px;
  min-height: 100vh;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  background: white;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  overflow: hidden;
}

.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 30px;
  text-align: center;
}

.header h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.header p {
  opacity: 0.9;
  font-size: 16px;
}

.content {
  padding: 30px;
}

.credentials {
  background: #f8f9fa;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.credentials h3 {
  margin-bottom: 15px;
  color: #667eea;
}

.input-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-bottom: 15px;
}

input, select {
  padding: 12px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  font-size: 14px;
  transition: all 0.3s;
}

input:focus, select:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

button {
  padding: 12px 30px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

#map {
  width: 100%;
  height: 500px;
  border-radius: 10px;
  margin: 20px 0;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin: 20px 0;
}

.stat-card {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.stat-card .number {
  font-size: 32px;
  font-weight: bold;
  margin-bottom: 5px;
}

.stat-card .label {
  opacity: 0.9;
  font-size: 14px;
}

.log {
  background: #f8f9fa;
  border-radius: 10px;
  padding: 15px;
  max-height: 200px;
  overflow-y: auto;
  font-family: 'Courier New', monospace;
  font-size: 12px;
}

.log-entry {
  padding: 5px 0;
  border-bottom: 1px solid #e0e0e0;
}

.log-entry:last-child {
  border-bottom: none;
}

.log-entry.success { color: #28a745; }
.log-entry.error { color: #dc3545; }
.log-entry.info { color: #667eea; }
.log-entry.warning { color: #ffc107; }

.property-list {
  margin-top: 20px;
  max-height: 400px;
  overflow-y: auto;
}

.property-item {
  background: white;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.3s;
}

.property-item:hover {
  border-color: #667eea;
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
  transform: translateX(5px);
}

.property-item.interesting {
  border-color: #28a745;
  background: #f0fff4;
}

.property-name {
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 5px;
  color: #333;
}

.property-details {
  font-size: 14px;
  color: #666;
}

.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  margin-left: 10px;
}

.badge.interesting {
  background: #28a745;
  color: white;
}

.export-section {
  margin-top: 20px;
  padding: 20px;
  background: #f8f9fa;
  border-radius: 10px;
}

.export-buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🏡 PropertyScout</h1>
    <p>Hitta fastigheter med styckning-potential</p>
  </div>

  <div class="content">
    
    <div class="credentials">
      <h3>⚙️ Inställningar</h3>
      <div class="input-group">
        <input type="text" id="username" placeholder="Lantmäteriet användarnamn" value="">
        <input type="password" id="password" placeholder="Lantmäteriet lösenord" value="">
      </div>
      <div class="input-group">
        <select id="kommun">
          <option value="">-- Välj kommun --</option>
          <option value="0114">Upplands Väsby (0114)</option>
          <option value="0115">Vallentuna (0115)</option>
          <option value="0117">Österåker (0117)</option>
          <option value="0120">Värmdö (0120)</option>
          <option value="0123">Järfälla (0123)</option>
          <option value="0125">Ekerö (0125)</option>
          <option value="0126">Huddinge (0126)</option>
          <option value="0127">Botkyrka (0127)</option>
          <option value="0128">Salem (0128)</option>
          <option value="0136">Haninge (0136)</option>
          <option value="0138">Tyresö (0138)</option>
          <option value="0139">Upplands-Bro (0139)</option>
          <option value="0140">Nykvarn (0140)</option>
          <option value="0160">Täby (0160)</option>
          <option value="0162">Danderyd (0162)</option>
          <option value="0163">Sollentuna (0163)</option>
          <option value="0180">Stockholm (0180)</option>
          <option value="0181">Södertälje (0181)</option>
          <option value="0182">Nacka (0182)</option>
          <option value="0183">Sundbyberg (0183)</option>
          <option value="0184">Solna (0184)</option>
          <option value="0186">Lidingö (0186)</option>
          <option value="0187">Vaxholm (0187)</option>
          <option value="0188">Norrtälje (0188)</option>
        </select>
        <input type="number" id="minSize" placeholder="Min tomtstorlek (m²)" value="800">
      </div>
      <button onclick="laddaFastigheter()" id="loadBtn">🚀 Ladda Fastigheter</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="number" id="totalCount">0</div>
        <div class="label">Totalt fastigheter</div>
      </div>
      <div class="stat-card">
        <div class="number" id="interestingCount">0</div>
        <div class="label">Intressanta (>min storlek)</div>
      </div>
      <div class="stat-card">
        <div class="number" id="avgSize">0</div>
        <div class="label">Medel-storlek (m²)</div>
      </div>
    </div>

    <div id="map"></div>

    <div class="property-list" id="propertyList"></div>

    <div class="export-section" id="exportSection" style="display:none;">
      <h3>📤 Exportera Data</h3>
      <div class="export-buttons">
        <button onclick="exportCSV()">📊 Ladda ner CSV</button>
        <button onclick="exportJSON()">📋 Ladda ner JSON</button>
        <button onclick="copyToClipboard()">📋 Kopiera till urklipp</button>
      </div>
    </div>

    <div class="log" id="log">
      <div class="log-entry info">Ange credentials och välj kommun för att börja...</div>
    </div>

  </div>
</div>

<script>
// ============================================
// PROPERTYSCOUT - FASTIGHETSANALYS
// ============================================

var map;
var fastighetslager;
var fastigheter = [];

// Initiering
function init() {
  log('Initierar karta...', 'info');
  
  map = L.map('map').setView([59.33, 18.07], 11);
  
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(map);
  
  fastighetslager = L.layerGroup().addTo(map);
  
  log('✓ Karta initierad', 'success');
}

function log(message, type) {
  type = type || 'info';
  var logDiv = document.getElementById('log');
  var entry = document.createElement('div');
  entry.className = 'log-entry ' + type;
  entry.textContent = new Date().toLocaleTimeString('sv-SE') + ' - ' + message;
  logDiv.appendChild(entry);
  logDiv.scrollTop = logDiv.scrollHeight;
  console.log('[' + type.toUpperCase() + ']', message);
}

// Huvudfunktion
async function laddaFastigheter() {
  var username = document.getElementById('username').value;
  var password = document.getElementById('password').value;
  var kommunKod = document.getElementById('kommun').value;
  var minSize = parseInt(document.getElementById('minSize').value) || 0;
  
  if (!username || !password) {
    alert('Ange användarnamn och lösenord!');
    return;
  }
  
  if (!kommunKod) {
    alert('Välj en kommun!');
    return;
  }
  
  var btn = document.getElementById('loadBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Laddar...';
  
  fastigheter = [];
  fastighetslager.clearLayers();
  document.getElementById('propertyList').innerHTML = '';
  
  try {
    var auth = 'Basic ' + btoa(username + ':' + password);
    
    log('Hämtar dataset-feed...', 'info');
    
    // Steg 1: Hämta dataset-feed via CORS proxy
    var feedUrl = 'https://api.lantmateriet.se/fastighetsomrade/atom/v1/inspire/cp/' + kommunKod;
    var proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(feedUrl);
    
    var feedRes = await fetch(proxyUrl, {
      headers: { 'Authorization': auth }
    });
    
    if (!feedRes.ok) throw new Error('HTTP ' + feedRes.status);
    
    var feedXml = await feedRes.text();
    log('✓ Dataset-feed hämtad', 'success');
    
    // Steg 2: Hitta dataset-URL
    var parser = new DOMParser();
    var feedDoc = parser.parseFromString(feedXml, 'text/xml');
    var entries = feedDoc.getElementsByTagName('entry');
    
    var datasetUrl = null;
    for (var i = 0; i < entries.length; i++) {
      var links = entries[i].getElementsByTagName('link');
      for (var j = 0; j < links.length; j++) {
        if (links[j].getAttribute('rel') === 'alternate' && 
            links[j].getAttribute('type') === 'application/zip') {
          datasetUrl = links[j].getAttribute('href');
          break;
        }
      }
      if (datasetUrl) break;
    }
    
    if (!datasetUrl) throw new Error('Ingen dataset-länk hittades');
    
    log('Laddar GML-data...', 'info');
    
    // Steg 3: Ladda GML via proxy
    var proxyGmlUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(datasetUrl);
    
    var gmlRes = await fetch(proxyGmlUrl, {
      headers: { 'Authorization': auth }
    });
    
    if (!gmlRes.ok) {
      // Försök med GML-format
      datasetUrl = datasetUrl.replace('format=application/zip', 'format=application/gml%2Bxml');
      proxyGmlUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(datasetUrl);
      gmlRes = await fetch(proxyGmlUrl, {
        headers: { 'Authorization': auth }
      });
    }
    
    if (!gmlRes.ok) throw new Error('HTTP ' + gmlRes.status);
    
    var gmlText = await gmlRes.text();
    log('✓ GML hämtad (' + (gmlText.length / 1024).toFixed(1) + ' KB)', 'success');
    
    // Steg 4: Parsa och analysera
    parseaOchAnalysera(gmlText, minSize);
    
  } catch (error) {
    log('❌ Fel: ' + error.message, 'error');
    alert('Kunde inte ladda data: ' + error.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 Ladda Fastigheter';
  }
}

function parseaOchAnalysera(gmlText, minSize) {
  log('Parsar GML...', 'info');
  
  var parser = new DOMParser();
  var gmlDoc = parser.parseFromString(gmlText, 'text/xml');
  
  // Hitta alla CadastralParcel
  var parcels = gmlDoc.getElementsByTagName('cp:CadastralParcel');
  if (parcels.length === 0) parcels = gmlDoc.getElementsByTagName('CadastralParcel');
  
  log('Hittade ' + parcels.length + ' fastigheter', 'info');
  
  var bounds = [];
  var totalArea = 0;
  var interestingCount = 0;
  
  for (var i = 0; i < Math.min(parcels.length, 2000); i++) {
    var parcel = parcels[i];
    
    // Hämta namn/label
    var labelEl = parcel.getElementsByTagName('cp:label')[0] || 
                  parcel.getElementsByTagName('label')[0];
    var name = labelEl ? labelEl.textContent : 'Fastighet ' + (i + 1);
    
    // Hämta koordinater
    var posLists = parcel.getElementsByTagName('gml:posList');
    if (posLists.length === 0) posLists = parcel.getElementsByTagName('posList');
    
    if (posLists.length === 0) continue;
    
    var coords = posLists[0].textContent.trim().split(/\s+/);
    var latlngs = [];
    
    for (var j = 0; j < coords.length - 1; j += 2) {
      var north = parseFloat(coords[j]);
      var east = parseFloat(coords[j + 1]);
      
      if (isNaN(north) || isNaN(east)) continue;
      
      // SWEREF99 TM → WGS84
      var lat = (north - 6100000) / 111320 + 55;
      var lon = (east - 500000) / 111320 + 9;
      
      if (lat >= 55 && lat <= 70 && lon >= 10 && lon <= 25) {
        latlngs.push([lat, lon]);
        bounds.push([lat, lon]);
      }
    }
    
    if (latlngs.length < 3) continue;
    
    // Beräkna area
    var area = beraknaArea(latlngs);
    totalArea += area;
    
    var isInteresting = area >= minSize;
    if (isInteresting) interestingCount++;
    
    // Spara fastighet
    fastigheter.push({
      name: name,
      area: area,
      latlngs: latlngs,
      interesting: isInteresting
    });
    
    // Rita på karta
    var polygon = L.polygon(latlngs, {
      color: isInteresting ? '#28a745' : '#667eea',
      weight: isInteresting ? 2 : 1,
      fillColor: isInteresting ? '#28a745' : '#667eea',
      fillOpacity: isInteresting ? 0.3 : 0.15
    }).addTo(fastighetslager);
    
    polygon.bindPopup('<b>' + name + '</b><br>Area: ' + area.toLocaleString('sv-SE') + ' m²');
  }
  
  log('✓ Parsade ' + fastigheter.length + ' fastigheter', 'success');
  
  // Uppdatera statistik
  document.getElementById('totalCount').textContent = fastigheter.length;
  document.getElementById('interestingCount').textContent = interestingCount;
  document.getElementById('avgSize').textContent = Math.round(totalArea / fastigheter.length).toLocaleString('sv-SE');
  
  // Visa lista
  visaFastighetslista();
  
  // Zooma till området
  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [30, 30] });
  }
  
  // Visa export-sektion
  document.getElementById('exportSection').style.display = 'block';
}

// Beräkna area från polygon (approximation)
function beraknaArea(latlngs) {
  var area = 0;
  var j = latlngs.length - 1;
  
  for (var i = 0; i < latlngs.length; i++) {
    area += (latlngs[j][1] + latlngs[i][1]) * (latlngs[j][0] - latlngs[i][0]);
    j = i;
  }
  
  // Konvertera till m² (approximation)
  return Math.abs(area * 111320 * 111320 / 2);
}

function visaFastighetslista() {
  var list = document.getElementById('propertyList');
  list.innerHTML = '';
  
  // Sortera efter area (störst först)
  var sorted = fastigheter.slice().sort((a, b) => b.area - a.area);
  
  sorted.forEach(function(f) {
    var item = document.createElement('div');
    item.className = 'property-item' + (f.interesting ? ' interesting' : '');
    
    var name = document.createElement('div');
    name.className = 'property-name';
    name.textContent = f.name;
    
    if (f.interesting) {
      var badge = document.createElement('span');
      badge.className = 'badge interesting';
      badge.textContent = '🎯 INTRESSANT';
      name.appendChild(badge);
    }
    
    var details = document.createElement('div');
    details.className = 'property-details';
    details.textContent = 'Area: ' + f.area.toLocaleString('sv-SE') + ' m²';
    
    item.appendChild(name);
    item.appendChild(details);
    
    item.onclick = function() {
      map.fitBounds(f.latlngs, { padding: [50, 50] });
    };
    
    list.appendChild(item);
  });
}

// Export-funktioner
function exportCSV() {
  var csv = 'Fastighet,Area (m²),Intressant\n';
  
  fastigheter.forEach(function(f) {
    csv += f.name + ',' + f.area + ',' + (f.interesting ? 'Ja' : 'Nej') + '\n';
  });
  
  downloadFile(csv, 'fastigheter.csv', 'text/csv');
  log('✓ CSV exporterad', 'success');
}

function exportJSON() {
  var data = fastigheter.map(function(f) {
    return {
      name: f.name,
      area: f.area,
      interesting: f.interesting
    };
  });
  
  downloadFile(JSON.stringify(data, null, 2), 'fastigheter.json', 'application/json');
  log('✓ JSON exporterad', 'success');
}

function copyToClipboard() {
  var text = fastigheter
    .filter(f => f.interesting)
    .map(f => f.name + ': ' + f.area.toLocaleString('sv-SE') + ' m²')
    .join('\n');
  
  navigator.clipboard.writeText(text).then(function() {
    alert('Kopierat ' + fastigheter.filter(f => f.interesting).length + ' intressanta fastigheter till urklipp!');
    log('✓ Kopierat till urklipp', 'success');
  });
}

function downloadFile(content, filename, type) {
  var blob = new Blob([content], { type: type });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// Starta appen
window.onload = init;
</script>

</body>
</html>
