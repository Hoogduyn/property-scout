<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>PropertyScout Debug</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body { margin: 20px; font-family: Arial; background: #667eea; }
.box { background: white; padding: 20px; border-radius: 10px; margin: 10px 0; }
h1 { color: white; }
input, select, button { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ddd; }
button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
#map { height: 500px; border-radius: 10px; }
#log { background: #f8f9fa; padding: 15px; border-radius: 5px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
.success { color: #28a745; }
.error { color: #dc3545; }
.info { color: #007bff; }
</style>
</head>
<body>

<h1>🏡 PropertyScout - Debug Version</h1>

<div class="box">
<h3>🔐 Credentials</h3>
<input type="text" id="user" placeholder="Användarnamn">
<input type="password" id="pass" placeholder="Lösenord">
<button onclick="testAPI()">🧪 Test API</button>
<button onclick="loadData()">🚀 Ladda Data</button>
</div>

<div class="box">
<h3>⚙️ Settings</h3>
<select id="kommun">
<option value="">Välj kommun</option>
<option value="0120">Värmdö (0120)</option>
<option value="0127">Botkyrka (0127)</option>
<option value="0180">Stockholm (0180)</option>
</select>
<input type="number" id="minSize" value="800" placeholder="Min storlek (m²)">
</div>

<div class="box">
<div id="map"></div>
</div>

<div class="box">
<h3>📊 Log</h3>
<div id="log"></div>
</div>

<script>
var map, layer;

// Init
window.onload = function() {
  log('Initierar karta...', 'info');
  map = L.map('map').setView([59.33, 18.07], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  layer = L.layerGroup().addTo(map);
  log('✓ Klar!', 'success');
};

function log(msg, type) {
  var div = document.getElementById('log');
  var entry = document.createElement('div');
  entry.className = type || 'info';
  entry.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
  div.appendChild(entry);
  div.scrollTop = div.scrollHeight;
  console.log('[' + (type || 'info').toUpperCase() + ']', msg);
}

function getAuth() {
  var u = document.getElementById('user').value;
  var p = document.getElementById('pass').value;
  if (!u || !p) {
    alert('Ange användarnamn och lösenord!');
    return null;
  }
  return 'Basic ' + btoa(u + ':' + p);
}

// Test API
async function testAPI() {
  var auth = getAuth();
  if (!auth) return;
  
  try {
    log('Testar STAC API...', 'info');
    
    // Test collections
    var res = await fetch('https://api.lantmateriet.se/stac-vektor/v1/collections', {
      headers: { 'Authorization': auth }
    });
    
    if (!res.ok) throw new Error('HTTP ' + res.status);
    
    var data = await res.json();
    log('✓ API fungerar! Hittade ' + data.collections.length + ' collections', 'success');
    
    console.log('=== ALLA COLLECTIONS ===');
    data.collections.forEach(function(c) {
      console.log('- ID:', c.id);
      console.log('  Title:', c.title);
      console.log('  Description:', c.description);
      console.log('---');
    });
    
    log('Kolla konsolen för detaljer!', 'info');
    
  } catch (error) {
    log('❌ Fel: ' + error.message, 'error');
    console.error(error);
  }
}

// Load data
async function loadData() {
  var auth = getAuth();
  if (!auth) return;
  
  var kommun = document.getElementById('kommun').value;
  if (!kommun) {
    alert('Välj kommun!');
    return;
  }
  
  try {
    log('Hämtar collections...', 'info');
    
    var res1 = await fetch('https://api.lantmateriet.se/stac-vektor/v1/collections', {
      headers: { 'Authorization': auth }
    });
    
    if (!res1.ok) throw new Error('HTTP ' + res1.status);
    var data1 = await res1.json();
    
    log('Hittade ' + data1.collections.length + ' collections', 'success');
    
    // Hitta fastighetsindelning
    var coll = data1.collections.find(function(c) {
      return c.id && c.id.toLowerCase().includes('fastighet');
    });
    
    if (!coll) {
      log('❌ Ingen fastighetsindelning hittades!', 'error');
      console.log('Tillgängliga collections:', data1.collections.map(c => c.id));
      return;
    }
    
    log('Använder: ' + coll.id, 'info');
    
    // Hämta items
    var url = 'https://api.lantmateriet.se/stac-vektor/v1/collections/' + coll.id + '/items?limit=1000';
    log('Anropar: ' + url, 'info');
    
    var res2 = await fetch(url, {
      headers: { 'Authorization': auth }
    });
    
    if (!res2.ok) throw new Error('HTTP ' + res2.status);
    var data2 = await res2.json();
    
    log('Fick ' + data2.features.length + ' features', data2.features.length > 0 ? 'success' : 'error');
    
    if (data2.features.length === 0) {
      log('⚠️ Inga features i collection!', 'error');
      console.log('Tom response:', data2);
    } else {
      console.log('Första feature:', data2.features[0]);
      console.log('Properties:', data2.features[0].properties);
      
      // Rita på karta
      drawFeatures(data2.features);
    }
    
  } catch (error) {
    log('❌ Fel: ' + error.message, 'error');
    console.error(error);
  }
}

function drawFeatures(features) {
  layer.clearLayers();
  
  var bounds = [];
  
  features.forEach(function(f) {
    if (!f.geometry || f.geometry.type !== 'Polygon') return;
    
    var coords = f.geometry.coordinates[0];
    var latlngs = coords.map(function(c) { return [c[1], c[0]]; });
    
    var poly = L.polygon(latlngs, {
      color: '#28a745',
      weight: 2,
      fillOpacity: 0.2
    }).addTo(layer);
    
    var name = f.properties.label || f.properties.name || 'Fastighet';
    poly.bindPopup('<b>' + name + '</b>');
    
    latlngs.forEach(function(ll) { bounds.push(ll); });
  });
  
  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [30, 30] });
    log('✓ Ritade ' + features.length + ' fastigheter', 'success');
  }
}
</script>

</body>
</html>
