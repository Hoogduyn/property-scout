<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertyScout - STAC API</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body{margin:0;padding:20px;font-family:sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh}.container{max-width:1400px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:30px;text-align:center}.header h1{font-size:36px;margin-bottom:10px}.header p{opacity:.9;font-size:16px}.content{padding:30px}.credentials{background:#f8f9fa;padding:20px;border-radius:10px;margin-bottom:20px}.credentials h3{margin-bottom:15px;color:#667eea}.input-group{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px}input,select{padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;transition:all .3s}input:focus,select:focus{outline:0;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}button{padding:12px 30px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s}button:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(102,126,234,.4)}button:disabled{opacity:.5;cursor:not-allowed;transform:none}#map{width:100%;height:500px;border-radius:10px;margin:20px 0;box-shadow:0 4px 15px rgba(0,0,0,.1)}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin:20px 0}.stat-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:20px;border-radius:10px;text-align:center}.stat-card .number{font-size:32px;font-weight:700;margin-bottom:5px}.stat-card .label{opacity:.9;font-size:14px}.log{background:#f8f9fa;border-radius:10px;padding:15px;max-height:200px;overflow-y:auto;font-family:'Courier New',monospace;font-size:12px}.log-entry{padding:5px 0;border-bottom:1px solid #e0e0e0}.log-entry:last-child{border-bottom:none}.log-entry.success{color:#28a745}.log-entry.error{color:#dc3545}.log-entry.info{color:#667eea}.log-entry.warning{color:#ffc107}.property-list{margin-top:20px;max-height:400px;overflow-y:auto}.property-item{background:#fff;border:2px solid #e0e0e0;border-radius:8px;padding:15px;margin-bottom:10px;cursor:pointer;transition:all .3s}.property-item:hover{border-color:#667eea;box-shadow:0 4px 12px rgba(102,126,234,.2);transform:translateX(5px)}.property-item.interesting{border-color:#28a745;background:#f0fff4}.property-name{font-weight:700;font-size:16px;margin-bottom:5px;color:#333}.property-details{font-size:14px;color:#666}.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-left:10px}.badge.interesting{background:#28a745;color:#fff}.export-section{margin-top:20px;padding:20px;background:#f8f9fa;border-radius:10px}.export-buttons{display:flex;gap:10px;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🏡 PropertyScout</h1>
<p>STAC API - Fastighetsgränser</p>
</div>
<div class="content">
<div class="credentials">
<h3>⚙️ Inställningar</h3>
<div class="input-group">
<input type="text" id="username" placeholder="Användarnamn">
<input type="password" id="password" placeholder="Lösenord">
</div>
<div class="input-group">
<select id="kommun"><option value="">Välj kommun</option><option value="0120">Värmdö</option><option value="0127">Botkyrka</option><option value="0180">Stockholm</option></select>
<input type="number" id="minSize" placeholder="Min storlek (m²)" value="800">
</div>
<button onclick="ladda()">🚀 Ladda</button>
</div>
<div class="stats">
<div class="stat-card"><div class="number" id="tot">0</div><div class="label">Totalt</div></div>
<div class="stat-card"><div class="number" id="int">0</div><div class="label">Intressanta</div></div>
<div class="stat-card"><div class="number" id="avg">0</div><div class="label">Medel (m²)</div></div>
</div>
<div id="map"></div>
<div class="property-list" id="list"></div>
<div class="log" id="log"></div>
</div>
</div>
<script>
var map,layer,props=[],auth;
function init(){
log('Initierar...','info');
map=L.map('map').setView([59.33,18.07],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
layer=L.layerGroup().addTo(map);
log('Klar','success');
}
function log(m,t){
var d=document.getElementById('log');
var e=document.createElement('div');
e.className='log-entry '+t;
e.textContent=new Date().toLocaleTimeString()+' - '+m;
d.appendChild(e);
d.scrollTop=d.scrollHeight;
console.log(m);
}
async function ladda(){
var u=document.getElementById('username').value;
var p=document.getElementById('password').value;
var k=document.getElementById('kommun').value;
var m=parseInt(document.getElementById('minSize').value)||0;
if(!u||!p||!k){alert('Fyll i allt!');return;}
auth='Basic '+btoa(u+':'+p);
props=[];
layer.clearLayers();
document.getElementById('list').innerHTML='';
try{
log('Hämtar...','info');
var r1=await fetch('https://api.lantmateriet.se/stac-vektor/v1/collections',{headers:{'Authorization':auth}});
if(!r1.ok)throw new Error('HTTP '+r1.status);


}catch(e){
log('Fel: '+e.message,'error');
console.error(e);
}
}
function rita(gj,ms){
log('Ritar...','info');
var bs=[],ta=0,ic=0;
gj.features.forEach((f,i)=>{
if(!f.geometry||f.geometry.type!=='Polygon')return;
var cs=f.geometry.coordinates[0];
var ll=cs.map(c=>[c[1],c[0]]);
if(ll.length<3)return;
var a=area(ll);
ta+=a;
var ok=a>=ms;
if(ok)ic++;
var nm=f.properties.label||f.properties.name||'#'+(i+1);
props.push({name:nm,area:a,latlngs:ll,ok:ok});
var pg=L.polygon(ll,{color:ok?'#28a745':'#667eea',weight:ok?2:1,fillColor:ok?'#28a745':'#667eea',fillOpacity:ok?.3:.15}).addTo(layer);
pg.bindPopup('<b>'+nm+'</b><br>'+Math.round(a).toLocaleString('sv-SE')+' m²');
ll.forEach(l=>bs.push(l));
});
log('Ritade '+props.length,'success');
document.getElementById('tot').textContent=props.length;
document.getElementById('int').textContent=ic;
document.getElementById('avg').textContent=Math.round(ta/props.length).toLocaleString('sv-SE');
lista();
if(bs.length>0)map.fitBounds(bs,{padding:[30,30]});
}
function area(ll){
var a=0,j=ll.length-1;
for(var i=0;i<ll.length;i++){
a+=(ll[j][1]+ll[i][1])*(ll[j][0]-ll[i][0]);
j=i;
}
return Math.abs(a*111320*111320/2);
}
function lista(){
var l=document.getElementById('list');
l.innerHTML='';
var s=props.slice().sort((a,b)=>b.area-a.area);
s.forEach(f=>{
var it=document.createElement('div');
it.className='property-item'+(f.ok?' interesting':'');
var nm=document.createElement('div');
nm.className='property-name';
nm.textContent=f.name;
if(f.ok){
var bg=document.createElement('span');
bg.className='badge interesting';
bg.textContent='🎯';
nm.appendChild(bg);
}
var dt=document.createElement('div');
dt.className='property-details';
dt.textContent=Math.round(f.area).toLocaleString('sv-SE')+' m²';
it.appendChild(nm);
it.appendChild(dt);
it.onclick=()=>map.fitBounds(f.latlngs,{padding:[50,50]});
l.appendChild(it);
});
}
window.onload=init;
</script>
</body>
</html>
